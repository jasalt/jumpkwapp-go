name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - run: go mod tidy

      - run: go build ./jumpkwapp.go
