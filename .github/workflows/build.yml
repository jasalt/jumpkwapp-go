name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - run: go mod tidy

      - name: Build for linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -o jumpkwapp-linux-${{ matrix.goarch }} ./jumpkwapp.go
