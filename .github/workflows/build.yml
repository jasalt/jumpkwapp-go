name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"
    tags:
      - "v*"
  pull_request:
    branches: [master]
    paths:
      - "**.go"
      - "**.js"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - run: go mod tidy

      - name: Build for linux/${{ matrix.goarch }}
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -o jumpkwapp-linux-${{ matrix.goarch }} ./jumpkwapp.go

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jumpkwapp-linux-${{ matrix.goarch }}
          path: jumpkwapp-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jumpkwapp-linux-amd64/jumpkwapp-linux-amd64
            jumpkwapp-linux-arm64/jumpkwapp-linux-arm64
